<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonTV Footer Showcase</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <!-- Conteúdo principal apenas para demonstrar o layout -->
    <main>
        <h1 class="page-title">MoonTV Showcase</h1>
        <p>Role para baixo para ver o footer.</p>
    </main>

    <!-- Início do Footer -->
    <footer class="moon-footer">
        <div class="footer-container">
            <!-- 1. Esquerda: Logo -->
            <div class="footer-brand">
                <a href="#" class="brand-logo" id="logo-btn">MOON TV</a>
            </div>

            <!-- 2. Meio: Descrição -->
            <div class="footer-description">
                <p>
                    Enjoy free, ad-free movie streaming. <br>
                    Experience <strong>smooth playback</strong> or download to save. 
                    Perfect for mobile viewing enthusiasts.
                </p>
            </div>

            <!-- 3. Direita: Botões -->
            <div class="footer-actions">
                <button class="btn js-action-btn" data-action="Request">Request</button>
                <button class="btn js-action-btn" data-action="Contact">Contact</button>
            </div>
        </div>

        <!-- Seção Inferior -->
        <div class="footer-bottom">
            <p class="copyright">© 2026 MoonTV. All rights reserved.</p>
            <p class="seo-text">watch free movies online • free movie streaming • download hd movies</p>
        </div>
    </footer>

    <!-- Container para notificações (Toasts) -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
