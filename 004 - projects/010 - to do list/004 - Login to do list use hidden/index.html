<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Pagina de validacao login</title>
</head>
<body>

	<!-- iniciacao da pagina de Validacao do login -->
	<form id="formLogin">
		<div class="avisoTempoBloqueio escondido"></div>
		<h3>Login</h3>
		<input class="login" type="" placeholder="Login">
		<input class="senha" type="password" placeholder="Senha" >
		<input class="logar" type="submit" value="logar">

	</form>
	<!-- Fim da pagina de Validacao do login -->


	<!-- Inicio pagina jogo da velha -->

	<div class="todoListPagina">
        <p>
            <input class="inputTarefa" type="text" name="" placeholder="digite a sua tarefa...">
            <button class="botaoAdicionarTarefa">adicionar</button>
        </p>

        <h3>Lista de Tarefas</h3>
        <ul class="lista-tarefas">
            <!-- As tarefas serão adicionadas aqui pelo JavaScript -->
        </ul>
    </div>

	<!-- Fim pagina jogo da velha -->


	<script type="text/javascript" src="script.js"></script>
</body>
</html>
