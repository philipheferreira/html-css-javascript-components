<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Pessoas</title>
    <style>
        /* --- CSS: Estilização --- */
        :root {
            --primary-color: #4a90e2;
            --edit-color: #f39c12;
            --danger-color: #e74c3c;
            --cancel-color: #7f8c8d;
            --bg-color: #f9f9f9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 { margin-top: 0; color: var(--primary-color); }

        /* Formulário */
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .input-wrapper { flex: 1; min-width: 140px; }

        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Botões do Formulário */
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        button {
            padding: 11px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }

        #btn-salvar { background-color: var(--primary-color); color: white; }
        #btn-cancelar { background-color: var(--cancel-color); color: white; display: none; } /* Escondido inicialmente */

        /* Modo de Edição (destaque na linha) */
        tr.editando {
            background-color: #fff3cd !important; /* Amarelo claro */
            border-left: 4px solid var(--edit-color);
        }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: var(--bg-color); }
        
        /* Botões de Ação na Tabela */
        .action-cell { display: flex; gap: 5px; }
        
        .btn-edit { background-color: var(--edit-color); color: white; padding: 5px 10px; font-size: 0.8rem; }
        .btn-delete { background-color: var(--danger-color); color: white; padding: 5px 10px; font-size: 0.8rem; }

        .empty-message { text-align: center; color: #777; padding: 20px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lista de Pessoas</h1>

        <!-- Formulário -->
        <form id="pessoaForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Nome completo" required>
                </div>
                <div class="input-wrapper">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" placeholder="Idade" min="0" required>
                </div>
                <div class="input-wrapper">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" placeholder="Cargo" required>
                </div>
                <div class="form-actions">
                    <button type="submit" id="btn-salvar">Adicionar Pessoa</button>
                    <button type="button" id="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
                </div>
            </div>
        </form>

        <!-- Tabela -->
        <table id="tabelaPessoas">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Cargo</th>
                    <th style="width: 140px;">Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- Linhas inseridas via JS -->
            </tbody>
        </table>
        <div id="mensagemVazia" class="empty-message">Nenhuma pessoa cadastrada.</div>
    </div>

    <script>
        /* --- JavaScript --- */
        
        // Dados iniciais
        const dadosIniciais = [
            { nome: "Ana Silva", idade: 28, cargo: "Designer" },
            { nome: "Carlos", idade: 35, cargo: "Gerente" },
            { nome: "Beatriz", idade: 24, cargo: "Dev Frontend" }
        ];

        // Variável para controlar qual linha estamos editando
        let linhaEditando = null;

        const form = document.getElementById('pessoaForm');
        const tabelaBody = document.querySelector('#tabelaPessoas tbody');
        const btnSalvar = document.getElementById('btn-salvar');
        const btnCancelar = document.getElementById('btn-cancelar');
        const mensagemVazia = document.getElementById('mensagemVazia');

        // Inicialização
        window.onload = () => {
            dadosIniciais.forEach(p => adicionarLinhaTabela(p.nome, p.idade, p.cargo));
        };

        // Função Adicionar Linha (Padrão)
        function adicionarLinhaTabela(nome, idade, cargo) {
            const novaLinha = document.createElement('tr');
            novaLinha.innerHTML = getHtmlLinha(nome, idade, cargo);
            tabelaBody.appendChild(novaLinha);
            verificarVazio();
        }

        // Gera o HTML das células da linha
        function getHtmlLinha(nome, idade, cargo) {
            return `
                <td class="cel-nome">${nome}</td>
                <td class="cel-idade">${idade}</td>
                <td class="cel-cargo">${cargo}</td>
                <td>
                    <div class="action-cell">
                        <button class="btn-edit" onclick="prepararEdicao(this)">Editar</button>
                        <button class="btn-delete" onclick="removerLinha(this)">Excluir</button>
                    </div>
                </td>
            `;
        }

        // Prepara o formulário para edição
        function prepararEdicao(botao) {
            const linha = botao.closest('tr');
            const nome = linha.querySelector('.cel-nome').innerText;
            const idade = linha.querySelector('.cel-idade').innerText;
            const cargo = linha.querySelector('.cel-cargo').innerText;

            // 1. Preenche o formulário
            document.getElementById('nome').value = nome;
            document.getElementById('idade').value = idade;
            document.getElementById('cargo').value = cargo;

            // 2. Atualiza variável de controle
            linhaEditando = linha;

            // 3. Visualmente mostra que estamos editando
            linha.classList.add('editando'); // Destaca a linha
            btnSalvar.innerText = "Salvar Alterações";
            btnSalvar.style.backgroundColor = "#f39c12"; // Muda cor para laranja
            btnCancelar.style.display = "inline-block"; // Mostra botão cancelar

            // 4. Foca no primeiro campo e rola a tela para cima
            document.getElementById('nome').focus();
            document.querySelector('.container').scrollIntoView({ behavior: 'smooth' });
        }

        // Cancela a edição e volta ao padrão
        function cancelarEdicao() {
            form.reset();
            linhaEditando.classList.remove('editando');
            linhaEditando = null;

            btnSalvar.innerText = "Adicionar Pessoa";
            btnSalvar.style.backgroundColor = ""; // Volta cor original
            btnCancelar.style.display = "none";
        }

        // Evento de Submit (Adicionar OU Editar)
        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const cargo = document.getElementById('cargo').value;

            if (linhaEditando) {
                // MODO EDIÇÃO: Atualiza a linha existente
                linhaEditando.querySelector('.cel-nome').innerText = nome;
                linhaEditando.querySelector('.cel-idade').innerText = idade;
                linhaEditando.querySelector('.cel-cargo').innerText = cargo;

                // Remove o destaque
                linhaEditando.classList.remove('editando');
                linhaEditando = null;
                
                // Reseta botões
                btnSalvar.innerText = "Adicionar Pessoa";
                btnSalvar.style.backgroundColor = "";
                btnCancelar.style.display = "none";

            } else {
                // MODE CRIAÇÃO: Cria nova linha
                adicionarLinhaTabela(nome, idade, cargo);
            }

            form.reset();
            document.getElementById('nome').focus();
        });

        // Remover Linha
        function removerLinha(botao) {
            const linha = botao.closest('tr');
            
            // Se tentar excluir a linha que está sendo editada, cancela a edição primeiro
            if (linha === linhaEditando) {
                cancelarEdicao();
            }

            linha.remove();
            verificarVazio();
        }

        // Controle da mensagem "Vazio"
        function verificarVazio() {
            mensagemVazia.style.display = tabelaBody.children.length === 0 ? 'block' : 'none';
        }
    </script>
</body>
</html>
