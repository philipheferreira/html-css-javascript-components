<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página com Modal de Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Conteúdo Principal da Página -->
    <div class="main-content">
        <h1>Bem-vindo ao Nosso Site</h1>
        <p>Esta é a página principal. Para acessar o conteúdo restrito, faça o login.</p>
        <button id="openModalBtn">Abrir Login / Cadastro</button>
    </div>

    <!-- Estrutura do Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <!-- Botão para fechar o modal (X) -->
            <span class="close-button">&times;</span>

            <!-- Container das Abas e Formulários -->
            <div class="auth-container">
                <!-- Cabeçalho com as Abas -->
                <div class="tabs">
                    <button class="tab-button active" data-tab="login">Entrar</button>
                    <button class="tab-button" data-tab="signup">Cadastrar</button>
                </div>

                <!-- Container dos Formulários -->
                <div class="forms-container">
                    <!-- Formulário de Login -->
                    <div id="login" class="form-panel active">
                        <form id="loginForm">
                            <h2>Bem-vindo de Volta!</h2>
                            <input type="email" placeholder="Email" required>
                            <input type="password" placeholder="Senha" required>
                            <button type="submit">Entrar</button>
                            <a href="#">Esqueceu a senha?</a>
                        </form>
                    </div>

                    <!-- Formulário de Cadastro -->
                    <div id="signup" class="form-panel">
                        <form id="signupForm">
                            <h2>Crie sua Conta</h2>
                            <input type="text" placeholder="Nome Completo" required>
                            <input type="email" placeholder="Email" required>
                            <input type="password" placeholder="Senha" required>
                            <button type="submit">Cadastrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
