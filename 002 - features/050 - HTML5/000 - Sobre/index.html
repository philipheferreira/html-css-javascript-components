<!DOCTYPE html> <!-- Declaração que este é um documento HTML5 -->
<html lang="pt-br"> <!-- Idioma da página -->

<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres para acentuação -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Torna a página responsiva para celulares -->
    <title>Minha Página HTML5</title>
</head>

<body>

    <header>
        <h1>Bem-vindo ao Meu Site</h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>
        <article>
            <h2>Um Título de Artigo</h2>
            <p>Este é o conteúdo principal da minha página. Graças ao HTML5, o navegador sabe que este é um artigo importante dentro do conteúdo principal.</p>
            
            <!-- Exemplo de vídeo nativo -->
            <video width="320" height="240" controls>
                <source src="meu_video.mp4" type="video/mp4">
                Seu navegador não suporta a tag de vídeo.
            </video>
        </article>

        <section>
            <h3>Formulário de Contato</h3>
            <form action="">
                <label for="email">Seu e-mail:</label>
                <input type="email" id="email" name="email" required placeholder="nome@exemplo.com">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 - Todos os direitos reservados.</p>
    </footer>

</body>

</html>
